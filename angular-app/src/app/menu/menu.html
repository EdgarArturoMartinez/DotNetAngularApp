<mat-toolbar class="navbar">

    <div class="navbar-brand">
      <span class="brand-icon">🥗</span>
      <span class="app-title">VegShop</span>
      <span class="brand-tagline">Admin Panel</span>
    </div>

    <span class="spacer"></span>

    <nav class="navbar-actions">
      <a routerLink="" mat-button routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-action">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a routerLink="products" mat-button routerLinkActive="active" class="nav-action">
        <mat-icon>inventory_2</mat-icon>
        <span>Products</span>
      </a>
      <button mat-icon-button class="nav-action-btn" matTooltip="Settings">
        <mat-icon>settings</mat-icon>
      </button>
    </nav>
  </div>
</mat-toolbar>
