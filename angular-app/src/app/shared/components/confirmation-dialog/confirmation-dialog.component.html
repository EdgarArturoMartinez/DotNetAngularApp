<div class="dialog-container">
  <div class="dialog-header" [ngClass]="'dialog-header-' + data.type">
    <mat-icon [class]="'dialog-icon icon-' + data.type">{{ getIcon() }}</mat-icon>
    <h2 mat-dialog-title class="dialog-title">{{ data.title }}</h2>
  </div>

  <mat-dialog-content class="dialog-content">
    <p class="dialog-message" [innerHTML]="data.message"></p>
    <p *ngIf="data.entityName" class="entity-name">"{{ data.entityName }}"</p>
  </mat-dialog-content>

  <mat-dialog-actions class="dialog-actions">
    <button 
      mat-stroked-button 
      (click)="onCancel()"
      class="cancel-button">
      <mat-icon>close</mat-icon>
      {{ data.cancelText }}
    </button>
    <button 
      mat-flat-button 
      [color]="data.type === 'delete' ? 'warn' : 'primary'"
      (click)="onConfirm()"
      class="confirm-button"
      cdkFocusInitial>
      <mat-icon>{{ data.type === 'delete' ? 'delete' : 'check' }}</mat-icon>
      {{ data.confirmText }}
    </button>
  </mat-dialog-actions>
</div>
