<div class="categories-wrapper">
  <!-- Header Section -->
  <div class="header-section">
    <div class="header-content">
      <h1 class="page-title">Category Management</h1>
      <p class="page-subtitle">Organize your vegetarian products by categories</p>
    </div>
    <button mat-flat-button routerLink="/categories/create" class="create-button">
      <mat-icon>add_circle</mat-icon>
      Add New Category
    </button>
  </div>

  <!-- Main Content -->
  <div class="categories-container">
    <!-- LOADING STATE -->
    <div *ngIf="isLoading" class="state-container loading-state">
      <mat-spinner diameter="50"></mat-spinner>
      <p>Loading categories...</p>
    </div>

    <!-- ERROR STATE -->
    <div *ngIf="!isLoading && error" class="state-container error-state">
      <div class="error-icon">⚠️</div>
      <h3>Unable to Load Categories</h3>
      <p class="error-text">{{ error }}</p>
      <button mat-stroked-button (click)="loadCategories()" class="retry-btn">
        <mat-icon>refresh</mat-icon>
        Try Again
      </button>
    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="!isLoading && !error && categories.length === 0" class="state-container empty-state">
      <div class="empty-icon">📁</div>
      <h3>No Categories Yet</h3>
      <p>Create categories to organize your products</p>
      <button mat-flat-button routerLink="/categories/create" class="empty-button">
        <mat-icon>add</mat-icon>
        Create Your First Category
      </button>
    </div>

    <!-- DATA TABLE WITH LIST/CARD VIEWS, SEARCH, AND PAGINATION -->
    <app-generic-data-table 
      *ngIf="!isLoading && !error && categories.length > 0"
      [items]="categories"
      [columns]="columns"
      [actions]="actions"
      [hiddenColumns]="hiddenColumns"
      [cardEmoji]="'🕋'"
      searchPlaceholder="Search categories by name or description..."
      noDataMessage="No categories match your search criteria"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      (reload)="loadCategories()"
    ></app-generic-data-table>
