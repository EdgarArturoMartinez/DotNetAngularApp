<div class="form-wrapper">
  <div class="form-header">
    <div>
      <h2 class="form-title">Create New Category</h2>
      <p class="form-subtitle">Add a new category to organize your products</p>
    </div>
  </div>

  <div class="form-container">
    <form [formGroup]="vegCategoryForm" (ngSubmit)="saveChanges()" class="category-form">
      <div class="form-field">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category Name</mat-label>
          <input matInput formControlName="categoryName" placeholder="e.g., Fresh Vegetables" type="text" required>
          <mat-icon matSuffix>category</mat-icon>
          <mat-error *ngIf="vegCategoryForm.get('categoryName')?.hasError('required')">
            Category name is required
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea 
            matInput 
            formControlName="description" 
            placeholder="Describe this category..."
            rows="4"
          ></textarea>
          <mat-icon matSuffix>description</mat-icon>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-flat-button type="submit" class="submit-btn" [disabled]="!vegCategoryForm.valid">
          <mat-icon>check_circle</mat-icon>
          Create Category
        </button>
        <a mat-stroked-button routerLink="/categories" class="cancel-btn">
          <mat-icon>close</mat-icon>
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
