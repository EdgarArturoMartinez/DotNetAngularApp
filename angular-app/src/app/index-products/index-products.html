<div class="products-wrapper">
  <!-- Header Section -->
  <div class="header-section">
    <div class="header-content">
      <h1 class="page-title">Product Catalog</h1>
      <p class="page-subtitle">Manage your vegetarian product inventory</p>
    </div>
    <button mat-flat-button routerLink="/products/create" class="create-button">
      <mat-icon>add_circle</mat-icon>
      Add New Product
    </button>
  </div>

  <!-- Main Content -->
  <div class="products-container">
    <!-- LOADING STATE -->
    <div *ngIf="isLoading" class="state-container loading-state">
      <mat-spinner diameter="50"></mat-spinner>
      <p>Loading products...</p>
    </div>

    <!-- ERROR STATE -->
    <div *ngIf="!isLoading && error" class="state-container error-state">
      <div class="error-icon">⚠️</div>
      <h3>Unable to Load Products</h3>
      <p class="error-text">{{ error }}</p>
      <button mat-stroked-button (click)="loadProducts()" class="retry-btn">
        <mat-icon>refresh</mat-icon>
        Try Again
      </button>
    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="!isLoading && !error && products.length === 0" class="state-container empty-state">
      <div class="empty-icon">📦</div>
      <h3>No Products Yet</h3>
      <p>Start building your catalog by adding your first product</p>
      <button mat-flat-button routerLink="/products/create" class="empty-button">
        <mat-icon>add</mat-icon>
        Create Your First Product
      </button>
    </div>

    <!-- DATA TABLE WITH LIST/CARD VIEWS, SEARCH, AND PAGINATION -->
    <app-generic-data-table 
      *ngIf="!isLoading && !error && products.length > 0"
      [items]="products"
      [columns]="columns"
      [actions]="actions"
      [hiddenColumns]="hiddenColumns"
      [cardEmoji]="'📋'"
      searchPlaceholder="Search products by name, category, description..."
      noDataMessage="No products match your search criteria"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      (reload)="loadProducts()"
    ></app-generic-data-table>
  </div>
</div>
